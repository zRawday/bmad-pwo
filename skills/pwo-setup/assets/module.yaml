code: pwo
name: "Parallel Wave Orchestration"
description: "Orchestrate the parallel implementation of a BMad backlog in isolated waves (git worktrees), keeping the main branch always green and conflict-free."
module_version: 1.0.0
default_selected: false
expands: bmm
module_greeting: |
  Parallel Wave Orchestration (PWO) is installed — an expansion of bmm.

  PWO is a GUIDED, 6-step pipeline. Run the steps IN ORDER, each in its OWN fresh Claude
  session: every step ends by printing a paste-ready prompt that launches the next one, so
  you are never left guessing what to run. It slots in AFTER planning (prd -> architecture ->
  epics -> readiness) and BEFORE the first create-story, through to closeout.

    STEP 1  /pwo-setup          - configure the module + verify prerequisites (you are here)
    STEP 2  /pwo-probe-harness  - probe what the harness allows  (the REQUIRED first run step)
    STEP 3  /pwo-plan-waves     - applicability gate + adversarial DAG + waves + Phase 0 spec
    STEP 4  /pwo-build-phase0   - build AND prove the Phase-0 guard-rails on main
    STEP 5  /pwo-run-wave       - run one wave end-to-end (repeat per wave, each a fresh session)
    STEP 6  /pwo-closeout       - final E2E smokes + consolidation + maturation report
            then /bmad-retrospective (the reused product/process retro)

    helper  /pwo-ui-smoke       - on-call screen/journey smoke; auto-invoked by steps 5 & 6.
                                  You never launch it yourself.

  It REUSES bmm's create-story / dev-story (EMULATED, never invoked), code-review,
  retrospective, and sprint-status — nothing to reinstall.

  NEXT: run `/pwo-probe-harness` now — right after readiness, before planning — the whole
  mechanism is planned on its result. When it finishes it will hand you STEP 3. (Setup does
  NOT auto-run it; the probe is human-triggered.)

  Re-run this setup anytime to reconfigure (or edit _bmad/config.yaml directly).

worktree_workspace:
  prompt: "Absolute (or {project-root}-relative) path to the sibling directory that will hold the lane worktrees"
  default: "{project-root}/../<project-name>-wt"

main_branch:
  prompt: "Name of the main branch the orchestrator keeps green (detected from git)"
  default: "master"

smoke_harness:
  prompt: "Which UI smoke harness fits this project's target?"
  default: "expo-mcp"
  type: single-select
  options:
    - value: "expo-mcp"
      label: "Expo MCP - React Native / Expo apps on an emulator or device"
    - value: "chrome-devtools"
      label: "Chrome DevTools - web apps"
    - value: "adb"
      label: "adb - raw Android emulator/device control"
    - value: "none"
      label: "None - no UI harness; screen-wave validation will be jest-only (UI blind spot uncovered)"
